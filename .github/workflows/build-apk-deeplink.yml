name: Build BridgeAppB DeepLink APK

on:
  push:
    branches: [ main ]
    paths:
      - 'BridgeAppB_DeepLink/**'
      - '.github/workflows/build-apk-deeplink.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Criar local.properties com caminho do Android SDK
        working-directory: BridgeAppB_DeepLink
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK Debug
        working-directory: BridgeAppB_DeepLink
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BridgeAppB-deeplink-apk
          path: BridgeAppB_DeepLink/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
